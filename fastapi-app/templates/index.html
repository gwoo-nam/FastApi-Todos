<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Modern To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── CSS 변수 (라이트 / 다크) ── */
        :root {
            --bg:           #f4f7fb;
            --surface:      #ffffff;
            --surface2:     #f8fafc;
            --primary:      #4f46e5;
            --primary-h:    #4338ca;
            --primary-soft: rgba(79, 70, 229, 0.1);
            --text:         #0f172a;
            --text-2:       #475569;
            --text-muted:   #94a3b8;
            --border:       #e2e8f0;
            --shadow-sm:    0 2px 10px rgba(0,0,0,.04);
            --shadow:       0 10px 30px rgba(0,0,0,.06);
            --shadow-lg:    0 24px 60px rgba(0,0,0,.12);
            --radius:       18px;
            --radius-sm:    10px;
            --high:         #ef4444;
            --medium:       #f59e0b;
            --low:          #10b981;
            --transition:   0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg:           #0b1120;
            --surface:      #1e293b;
            --surface2:     #141d2d;
            --primary:      #6366f1;
            --primary-h:    #818cf8;
            --primary-soft: rgba(99, 102, 241, 0.15);
            --text:         #f8fafc;
            --text-2:       #cbd5e1;
            --text-muted:   #64748b;
            --border:       #334155;
            --shadow-sm:    0 2px 10px rgba(0,0,0,.2);
            --shadow:       0 10px 30px rgba(0,0,0,.3);
            --shadow-lg:    0 24px 60px rgba(0,0,0,.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', 'Pretendard', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            /* 모바일 바텀 바 겹침 방지 (Safe Area 적용) */
            padding: 40px 20px calc(80px + env(safe-area-inset-bottom, 20px));
            transition: background var(--transition), color var(--transition);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .container { max-width: 680px; margin: 0 auto; }

        /* ── 테마 토글 ── */
        .theme-btn {
            position: fixed;
            top: 20px; right: 20px;
            width: 44px; height: 44px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: rgba(var(--surface), 0.8);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-sm);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
            z-index: 50;
        }
        .theme-btn:hover { transform: translateY(-2px) rotate(15deg); box-shadow: var(--shadow); }

        /* ── 헤더 ── */
        header { text-align: center; margin-bottom: 32px; }
        header h1 {
            font-size: 32px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        header .subtitle { margin-top: 8px; font-size: 14px; color: var(--text-muted); font-weight: 500; }

        /* ── 통계 카드 ── */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            border: 1px solid var(--border);
            transition: transform var(--transition);
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .stat-num { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-card .stat-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 4px; }
        .stat-card.active .stat-num { color: var(--medium); }
        .stat-card.done .stat-num { color: var(--low); }

        /* ── 진행률 바 ── */
        .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .progress-bar-bg { flex: 1; height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            border-radius: 99px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-pct { font-size: 13px; font-weight: 700; color: var(--primary); min-width: 36px; text-align: right; }

        /* ── 입력 폼 카드 ── */
        .form-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px; margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .form-card h2 {
            font-size: 12px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-grid .span-2 { grid-column: span 2; }

        .form-card input, .form-card select {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-size: 14px; font-family: inherit;
            color: var(--text); background: var(--surface2);
            transition: all 0.2s; outline: none;
        }
        .form-card input:focus, .form-card select:focus {
            border-color: var(--primary); background: var(--surface);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .btn-add {
            width: 100%; padding: 14px;
            border: none; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.9; }
        .btn-add:active { transform: scale(0.98); }

        /* ── 검색 + 필터 ── */
        .search-filter { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .search-wrap { position: relative; }
        .search-wrap input {
            width: 100%; padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            font-size: 14px; color: var(--text); background: var(--surface);
            outline: none; transition: all 0.2s;
        }
        .search-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .search-wrap .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.5; }

        .filter-sort-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-tabs { display: flex; gap: 6px; flex: 1; background: var(--surface); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .filter-tab {
            flex: 1; padding: 8px 0; border: none; border-radius: 6px;
            background: transparent; color: var(--text-2); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .filter-tab.active { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }
        .sort-select {
            padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 600; color: var(--text); background: var(--surface); outline: none; cursor: pointer;
        }

        /* ── 리스트 헤더 ── */
        .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 0 4px; }
        .list-header-left { font-size: 14px; color: var(--text-muted); font-weight: 500; }
        #todo-count { font-weight: 700; color: var(--primary); }

        .btn-bulk-delete {
            padding: 6px 14px; border: none; border-radius: 8px;
            background: rgba(239, 68, 68, 0.1); color: #ef4444; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-bulk-delete:hover:not(:disabled) { background: rgba(239, 68, 68, 0.2); }
        .btn-bulk-delete:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── 할 일 아이템 ── */
        #todo-list { list-style: none; }
        li.todo-item {
            background: var(--surface); border-radius: var(--radius);
            box-shadow: var(--shadow-sm); padding: 18px; margin-bottom: 12px;
            display: flex; align-items: flex-start; gap: 16px;
            border: 1px solid var(--border);
            border-left: 6px solid var(--primary);
            transition: all var(--transition); animation: slideIn 0.3s ease;
        }
        li.todo-item:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        li.todo-item[data-priority="상"] { border-left-color: var(--high); }
        li.todo-item[data-priority="중"] { border-left-color: var(--medium); }
        li.todo-item[data-priority="하"] { border-left-color: var(--low); }

        li.todo-item.completed { opacity: 0.6; border-left-color: var(--border) !important; background: var(--surface2); }
        li.todo-item.completed .todo-title { text-decoration: line-through; color: var(--text-muted); }

        /* 체크박스 커스텀 */
        .check-wrap { position: relative; width: 22px; height: 22px; flex-shrink: 0; margin-top: 2px; }
        .check-wrap input[type="checkbox"] {
            appearance: none; width: 22px; height: 22px;
            border: 2px solid var(--border); border-radius: 6px;
            cursor: pointer; background: var(--surface); transition: all 0.2s;
        }
        .check-wrap input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); }
        .check-wrap input[type="checkbox"]:checked::after {
            content: ''; position: absolute; left: 7px; top: 3px; width: 5px; height: 10px;
            border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg);
        }

        .todo-content { flex: 1; min-width: 0; }
        .todo-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; word-break: break-word; color: var(--text); }
        .todo-desc  { font-size: 13px; color: var(--text-2); margin-bottom: 10px; word-break: break-word; line-height: 1.4; }

        /* 뱃지 */
        .todo-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        
        .badge-category { background: var(--surface2); color: var(--text-2); border: 1px solid var(--border); }
        .badge-high   { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .badge-medium { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .badge-low    { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        
        .badge-date { background: rgba(99, 102, 241, 0.1); color: var(--primary); font-weight: 600; }
        .badge-date.overdue  { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .badge-date.today    { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        /* 액션 버튼 */
        .actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
        .actions button {
            padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-edit   { background: var(--surface2); color: var(--text-2); border: 1px solid var(--border); }
        .btn-edit:hover { background: var(--border); }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.2); }

        /* 완료 섹션 구분선 */
        .section-divider {
            display: flex; align-items: center; gap: 12px; margin: 24px 0 16px; cursor: pointer; user-select: none;
        }
        .section-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
        .section-divider span { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .section-divider .toggle-icon { display: inline-block; transition: transform 0.2s; margin-left: 4px; }
        .section-divider.collapsed .toggle-icon { transform: rotate(-90deg); }

        /* 토스트 및 모달 스타일은 기존과 유사하되 약간의 둥글기(Radius)만 조정했습니다. */
        /* 생략 없이 모두 포함해야 하므로 원본 스타일 구조를 유지하되 변수 적용 */
        #toast-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }
        .toast { background: var(--text); color: var(--surface); padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg); animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1), toastOut 0.3s ease 2.5s forwards; pointer-events: auto; }
        .toast.success { background: #10b981; color: #fff; }
        .toast.error   { background: #ef4444; color: #fff; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(10px) scale(0.9); } }

        /* 반응형 */
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .span-2 { grid-column: span 1; }
            .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>
    <button class="theme-btn" id="theme-toggle" title="다크/라이트 모드 전환">🌙</button>

    <div class="container">
        <header>
            <h1>✅ To-Do List</h1>
            <p class="subtitle">v5.1.0 — 카테고리 지원 및 모바일 UI 최적화</p>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="stat-total">0</div>
                <div class="stat-label">전체</div>
            </div>
            <div class="stat-card active">
                <div class="stat-num" id="stat-active">0</div>
                <div class="stat-label">진행중</div>
            </div>
            <div class="stat-card done">
                <div class="stat-num" id="stat-done">0</div>
                <div class="stat-label">완료</div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
            <div class="progress-pct" id="progress-pct">0%</div>
        </div>

        <div class="form-card">
            <h2>새 할 일 추가</h2>
            <form id="todo-form">
                <div class="form-grid">
                    <input class="span-2" type="text" id="title" placeholder="할 일 제목을 입력하세요" required>
                    <input class="span-2" type="text" id="description" placeholder="상세 설명 (선택)">
                    
                    <!-- 카테고리 선택 추가 -->
                    <select id="category">
                        <option value="💻 개발">💻 개발</option>
                        <option value="📚 학업">📚 학업</option>
                        <option value="☕ 일상" selected>☕ 일상</option>
                    </select>
                    
                    <select id="priority">
                        <option value="상">🔴 우선순위: 상</option>
                        <option value="중" selected>🟠 우선순위: 중</option>
                        <option value="하">🟢 우선순위: 하</option>
                    </select>
                    <input class="span-2" type="date" id="due_date">
                </div>
                <button type="submit" class="btn-add">＋ 추가하기</button>
            </form>
        </div>

        <div class="search-filter">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="검색 — 제목, 설명으로 찾기">
            </div>
            <div class="filter-sort-row">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">전체</button>
                    <button class="filter-tab" data-filter="active">진행중</button>
                    <button class="filter-tab" data-filter="done">완료</button>
                </div>
                <select class="sort-select" id="sort-select">
                    <option value="priority">정렬: 우선순위</option>
                    <option value="duedate">정렬: 마감일</option>
                    <option value="created">정렬: 등록순</option>
                </select>
            </div>
        </div>

        <div class="list-header">
            <span class="list-header-left">남은 할 일 <strong id="todo-count">0</strong>개</span>
            <button class="btn-bulk-delete" id="bulk-delete-btn" disabled>완료 일괄 삭제</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <!-- 토스트 컨테이너 -->
    <div id="toast-container"></div>

    <script>
        const PRIORITY_ORDER = { "상": 0, "중": 1, "하": 2 };
        const PRIORITY_CLASS = { "상": "badge-high", "중": "badge-medium", "하": "badge-low" };

        let allTodos = [];
        let currentFilter = 'all';
        let currentSort = 'priority';
        let searchQuery = '';
        let completedCollapsed = false;

        // 테마 로직 유지
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeBtn.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const next = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
        };

        function showToast(msg, type = '') {
            const ct = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = 'toast ' + type;
            el.textContent = msg;
            ct.appendChild(el);
            setTimeout(() => el.remove(), 2800);
        }

        function todayStr() { return new Date().toISOString().slice(0, 10); }
        function dday(dateStr) {
            if (!dateStr) return null;
            const now = new Date(); now.setHours(0,0,0,0);
            const due = new Date(dateStr); due.setHours(0,0,0,0);
            const diff = Math.round((due - now) / 86400000);
            return diff === 0 ? 'D-Day' : diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
        }

        // 기존 렌더링 및 통계 함수 생략 없이 축약 통합
        function updateStats(todos) {
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const active = total - done;
            const pct = total ? Math.round(done / total * 100) : 0;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-done').textContent = done;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-pct').textContent = pct + '%';
            document.getElementById('todo-count').textContent = active;
            document.getElementById('bulk-delete-btn').disabled = done === 0;
        }

        function renderTodos(todos) {
            updateStats(todos);
            const list = document.getElementById('todo-list');
            list.innerHTML = '';

            let result = todos;
            if (currentFilter === 'active') result = result.filter(t => !t.completed);
            if (currentFilter === 'done') result = result.filter(t => t.completed);
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                result = result.filter(t => t.title.toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q));
            }

            result.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (currentSort === 'duedate') return (a.due_date || '9999') > (b.due_date || '9999') ? 1 : -1;
                if (currentSort === 'created') return a.id - b.id;
                const pa = PRIORITY_ORDER[a.priority] ?? 1, pb = PRIORITY_ORDER[b.priority] ?? 1;
                return pa !== pb ? pa - pb : (a.due_date || '9999') > (b.due_date || '9999') ? 1 : -1;
            });

            const active = result.filter(t => !t.completed);
            const done = result.filter(t => t.completed);

            active.forEach(t => list.appendChild(createItem(t)));

            if (done.length) {
                const divider = document.createElement('div');
                divider.className = 'section-divider' + (completedCollapsed ? ' collapsed' : '');
                divider.innerHTML = `<hr><span>완료 ${done.length}개 <span class="toggle-icon">▼</span></span><hr>`;
                divider.onclick = () => {
                    completedCollapsed = !completedCollapsed;
                    divider.classList.toggle('collapsed', completedCollapsed);
                    doneWrap.style.display = completedCollapsed ? 'none' : 'block';
                };
                list.appendChild(divider);

                const doneWrap = document.createElement('div');
                doneWrap.style.display = completedCollapsed ? 'none' : 'block';
                done.forEach(t => doneWrap.appendChild(createItem(t)));
                list.appendChild(doneWrap);
            }
        }

        function createItem(todo) {
            const li = document.createElement('li');
            li.className = 'todo-item' + (todo.completed ? ' completed' : '');
            li.dataset.priority = todo.priority ?? '중';

            li.innerHTML = `
                <div class="check-wrap">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleComplete(${todo.id})">
                </div>
                <div class="todo-content">
                    <div class="todo-title">${todo.title}</div>
                    ${todo.description ? `<div class="todo-desc">${todo.description}</div>` : ''}
                    <div class="todo-meta">
                        <!-- 카테고리 뱃지 렌더링 추가 -->
                        ${todo.category ? `<span class="badge badge-category">${todo.category}</span>` : ''}
                        <span class="badge ${PRIORITY_CLASS[todo.priority ?? '중']}">${todo.priority === '상' ? '🔴' : todo.priority === '중' ? '🟠' : '🟢'} ${todo.priority ?? '중'}</span>
                        ${todo.due_date ? `<span class="badge badge-date ${!todo.completed && todo.due_date < todayStr() ? 'overdue' : ''}">📅 ${todo.due_date.replace(/-/g, '.')} (${dday(todo.due_date)})</span>` : ''}
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">삭제</button>
                </div>
            `;
            return li;
        }

        // 백엔드 통신 API
        async function fetchTodos() {
            try {
                const res = await fetch('/todos');
                allTodos = await res.json();
                renderTodos(allTodos);
            } catch (e) {
                console.error('API 연동 필요', e);
                // 더미 데이터 (테스트용)
                if(allTodos.length === 0) renderTodos(allTodos); 
            }
        }

        document.getElementById('todo-form').addEventListener('submit', async e => {
            e.preventDefault();
            const payload = {
                id: Date.now(),
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('description').value.trim(),
                category: document.getElementById('category').value, // 카테고리 매핑
                due_date: document.getElementById('due_date').value || null,
                priority: document.getElementById('priority').value,
                completed: false
            };
            
            try {
                await fetch('/todos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            } catch(e) { allTodos.push(payload); } // 데모용 로직 보완
            
            e.target.reset();
            document.getElementById('category').value = '☕ 일상';
            document.getElementById('priority').value = '중';
            showToast('➕ 할 일이 추가되었습니다.', 'success');
            await fetchTodos();
        });

        async function toggleComplete(id) {
            const todo = allTodos.find(t => t.id === id);
            todo.completed = !todo.completed;
            try {
                await fetch(`/todos/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(todo) });
            } catch(e) {}
            showToast(todo.completed ? '🎉 완료! 수고하셨습니다.' : '✅ 다시 진행중으로 변경했습니다.', 'success');
            renderTodos(allTodos);
        }

        async function deleteTodo(id) {
            if(!confirm('삭제하시겠습니까?')) return;
            try { await fetch(`/todos/${id}`, { method: 'DELETE' }); } catch(e) {
                allTodos = allTodos.filter(t => t.id !== id);
            }
            showToast('🗑️ 삭제되었습니다.', 'error');
            renderTodos(allTodos);
        }

        document.getElementById('bulk-delete-btn').onclick = async () => {
            if(!confirm('완료된 항목을 모두 삭제하시겠습니까?')) return;
            const doneItems = allTodos.filter(t => t.completed);
            try {
                await Promise.all(doneItems.map(t => fetch(`/todos/${t.id}`, { method: 'DELETE' })));
            } catch(e) {
                allTodos = allTodos.filter(t => !t.completed);
            }
            showToast('🗑️ 일괄 삭제 완료', 'error');
            renderTodos(allTodos);
        };

        // 필터 & 정렬 이벤트
        document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value.trim(); renderTodos(allTodos); });
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTodos(allTodos);
            });
        });
        document.getElementById('sort-select').addEventListener('change', e => { currentSort = e.target.value; renderTodos(allTodos); });

        fetchTodos();
    </script>
</body>
</html>
